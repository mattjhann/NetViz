name: Deploy to GitHub Pages

on:
  # Deploy whenever the default branch is updated.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Serve from /<repo>/ — the path a project Pages site lives at. Using the
        # repository name keeps this correct even if the repo is renamed.
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Add SPA fallback
        # GitHub Pages has no SPA rewrite; serving index.html as 404.html lets
        # the client-side router handle deep links (e.g. /<repo>/tls) on refresh.
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
